<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reiniciar VEMALEX App</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #030f1f;
        color: #f8fbff;
        font-family: Arial, sans-serif;
        text-align: center;
      }

      main {
        max-width: 420px;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 12px;
        padding: 0 18px;
        border: 0;
        border-radius: 6px;
        background: linear-gradient(180deg, #f0c37b, #d59c56);
        color: #06162a;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reiniciando la app</h1>
      <p data-status>Limpiando cache de instalacion web...</p>
      <button type="button" data-open hidden>Abrir app</button>
    </main>
    <script>
      const statusText = document.querySelector("[data-status]");
      const openButton = document.querySelector("[data-open]");

      async function resetApp() {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          statusText.textContent = "Listo. Abre la app de nuevo.";
        } catch (error) {
          statusText.textContent = "No se pudo limpiar automáticamente. Abre la app de nuevo.";
        }
        openButton.hidden = false;
      }

      openButton.addEventListener("click", () => {
        window.location.href = "app-juridica/?fresh=" + Date.now();
      });

      resetApp();
    </script>
  </body>
</html>
